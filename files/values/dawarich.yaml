image:
  tag: 1.6.1

env:
  minMinutesSpentInCity: "30"
  timeZone: "America/New_York"
  distanceUnit: "mi"

dawarich:
  hosts:
    - location.test.pitlor.dev


oidc:
  enabled: true
  providerName: "Authentik"
  clientId:
    value: {{ .Values.dawarich.oidcClientId }}
  clientSecret:
    value: {{ .Values.dawarich.oidcClientSecret }}
  issuer: https://auth.test.pitlor.dev/application/o/dawarich/
  redirectUri: https://location.test.pitlor.dev/oauth/oidc/callback
  autoRegister: true
  allowEmailPasswordRegistration: false

postgresql:
  host: {{ template "dev.pitlor.homelab.postgres-name" (list $ "dawarich") }}
  port: 5432

  auth:
    database: dawarich
    password: dawarich
    username: dawarich
    postgresPassword: dawarich

redis:
  replicas: 1
  redis:
    config:
      min-replicas-to-write: 0
  sentinel:
    quorum: 1
  hardAntiAffinity: false

ingress:
  enabled: true
  className: traefik
  annotations: 
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Location History
    gethomepage.dev/icon: dawarich.png
    gethomepage.dev/name: Dawarich
    gethomepage.dev/group: Apps
    gethomepage.dev/pod-selector: ""
  hosts:
    - host: location.test.pitlor.dev
      paths:
        - path: /
          pathType: Prefix