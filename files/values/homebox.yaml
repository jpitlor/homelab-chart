image:
  tag: 0.24.2

env:
  HBOX_DATABASE_DRIVER: postgres
  HBOX_OIDC_ENABLED: true
  HBOX_OIDC_ISSUER_URL: https://auth.test.pitlor.dev/application/o/homebox/
  HBOX_OIDC_CLIENT_ID: {{ .Values.homebox.oidcClientId }}
  HBOX_OIDC_CLIENT_SECRET: {{ .Values.homebox.oidcClientSecret }}
  HBOX_OPTIONS_TRUST_PROXY: true
  HBOX_OPTIONS_HOSTNAME: inventory.test.pitlor.dev

postgresql:
  enabled: false

externalPostgresql:
  host: {{ template "dev.pitlor.homelab.postgres-name" (list $ "homebox") }}
  port: 5432
  auth:
    username: homebox
    password: homebox
    database: homebox

ingress:
  enabled: true
  className: traefik
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Inventory
    gethomepage.dev/icon: homebox.png
    gethomepage.dev/name: Homebox
    gethomepage.dev/group: Apps
    gethomepage.dev/pod-selector: ""
  hosts:
    - host: inventory.test.pitlor.dev
      paths:
        - path: /
          pathType: Prefix