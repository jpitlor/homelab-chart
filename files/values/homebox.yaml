image:
  tag: v0.24.2

env:
  HBOX_DATABASE_DRIVER: postgres

postgresql:
  enabled: false

externalPostgresql:
  host: {{ template "dev.pitlor.homelab.postgres-name" (list $ "homebox") }}
  port: 5432
  auth:
    username: homebox
    password: homebox
    database: homebox

ingress:
  enabled: true
  hosts:
    - host: inventory.test.pitlor.dev
      paths:
        - path: /
          pathType: Prefix