# https://github.com/guerzon/vaultwarden/blob/main/charts/vaultwarden/values.yaml
image:
  tag: 1.34.3
domain: https://passwords.test.pitlor.dev
podAnnotations:
  "backup.velero.io/backup-volumes": "vaultwarden-data,vaultwarden-attachments"
storage:
  data:
    name: vaultwarden-data
    storageClass: "ssd"
    size: "5Gi"
    accessMode: ReadWriteOnce
  attachments:
    name: vaultwarden-attachments
    storageClass: "ssd"
    size: "2Gi"
    accessMode: ReadWriteOnce
database:
  type: postgresql
  host: {{ template "dev.pitlor.homelab.postgres-name" (list $ "vaultwarden") }}
  port: "5432"
  username: vaultwarden
  password: vaultwarden
  dbName: vaultwarden
ingress:
  class: "traefik"
  enabled: true
  hostname: passwords.test.pitlor.dev
  additionalAnnotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Passwords
    gethomepage.dev/icon: vaultwarden.png
    gethomepage.dev/name: Vaultwarden
    gethomepage.dev/group: Apps
    gethomepage.dev/pod-selector: ""
