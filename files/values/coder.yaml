coder:  
  resources:
    requests:
     cpu: 100m
  ingress:
    enable: true
    className: traefik
    host: develop.test.pitlor.dev
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: Remote Development
      gethomepage.dev/icon: coder.png
      gethomepage.dev/name: Coder
      gethomepage.dev/group: Software Development
      gethomepage.dev/pod-selector: ""
  env:
    - name: CODER_PG_CONNECTION_URL
      value: postgres://coder:coder@{{ template "dev.pitlor.homelab.postgres-name" (list $ "coder") }}:5432
    - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
      value: "false"
    - name: CODER_ACCESS_URL
      value: "https://develop.test.pitlor.dev"
    - name: CODER_PROMETHEUS_ADDRESS
      value: "0.0.0.0:2112"
      name: CODER_OIDC_ISSUER_URL
      value: https://auth.test.pitlor.dev/application/o/coder/
    - name: CODER_OIDC_EMAIL_DOMAIN
      value: "gmail.com,pitlor.dev"
    - name: CODER_OIDC_CLIENT_ID
      value: {{ .Values.coder.oidcClientId }}
    - name: CODER_OIDC_CLIENT_SECRET
      value: {{ .Values.coder.oidcClientSecret }}
    - name: CODER_DISABLE_PASSWORD_AUTH
      value: true
