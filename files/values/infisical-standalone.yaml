infisical:
  autoDatabaseSchemaMigration: true
  image:
    tag: "v0.149.0"
  extraEnv:
    - name: SMTP_HOST
      value: send.email.svc.cluster.local
    - name: SMTP_FROM_ADDRESS
      value: noreply@pitlor.dev
    - name: SMTP_FROM_NAME
      value: Infisical
ingress:
  hostName: vault.test.pitlor.dev
  ingressClassName: traefik
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Secret Management
    gethomepage.dev/icon: sh-infisical.png
    gethomepage.dev/name: Infisical
    gethomepage.dev/group: System Administration
    gethomepage.dev/pod-selector: ""
redis:
  enabled: true
postgresql:
  enabled: false