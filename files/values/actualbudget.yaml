image:
  tag: 26.3.0

persistence:
  enabled: true
  storageClass: "ssd"
  size: 2Gi

login:
  method: "openid"
  allowedLoginMethods:
    - openid
  openid:
    enforce: true
    providerName: "Authentik"
    discoveryUrl: "https://auth.test.pitlor.dev/application/o/actual-budget/.well-known/openid-configuration"
    clientId: {{ .Values.actualbudget.oidcClientId }}
    clientSecret: {{ .Values.actualbudget.oidcClientSecret }}

ingress:
  enabled: true
  className: traefik
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Actual
    gethomepage.dev/description: Budgeting
    gethomepage.dev/icon: actual-budget.png
    gethomepage.dev/group: Apps
    gethomepage.dev/pod-selector: ""
  hosts:
    - host: budget.test.pitlor.dev
      paths:
        - path: /
          pathType: Prefix

