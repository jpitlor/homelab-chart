enableOpenaiApi: false
databaseUrl: postgres://open-webui:open-webui@{{ template "dev.pitlor.homelab.postgres-name" (list $ "open-webui") }}:5432/open-webui
image:
  tag: v0.8.12-cuda
ollama:
  enabled: true
  image:
    tag: 0.20.3
  extraEnv: 
    - name: CUDA_ERROR_LEVEL
      value: "50"
    - name: OLLAMA_DEBUG
      value: "1"
    - name: OPENID_PROVIDER_URL
      value: "https://auth.test.pitlor.dev/application/o/open-web-ui/.well-known/openid-configuration"
    - name: OAUTH_CLIENT_ID
      value: {{ (get .Values "open-webui").oidcClientId }}
    - name: OAUTH_CLIENT_SECRET
      value: {{ (get .Values "open-webui").oidcClientSecret }}
    - name: OPENID_PROVIDER_URL
      value: https://auth.test.pitlor.dev/application/o/open-web-ui/.well-known/openid-configuration
    - name: ENABLE_OAUTH_SIGNUP
      value: "true"
  ollama:
    gpu:
      enabled: true
      type: 'nvidia'
      number: 1
    models:
      pull:
        - gemma3n:e4b
      run:
        - gemma3n:e4b
  runtimeClassName: nvidia
  persistentVolume:
    enabled: true
ingress:
  enabled: true
  host: ai.test.pitlor.dev
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Generative AI
    gethomepage.dev/icon: open-webui.png
    gethomepage.dev/name: Open WebUI
    gethomepage.dev/group: Apps
    gethomepage.dev/pod-selector: ""