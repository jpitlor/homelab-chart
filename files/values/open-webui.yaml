enableOpenaiApi: false
databaseUrl: postgres://open-webui:open-webui@{{ template "dev.pitlor.homelab.postgres-name" (list . "open-webui") }}:5432/open-webui
image:
  tag: v0.8.10-cuda
ollama:
  enabled: true
  extraEnv: 
    - name: CUDA_ERROR_LEVEL
      value: "50"
    - name: OLLAMA_DEBUG
      value: "1"
  ollama:
    gpu:
      enabled: true
      type: 'nvidia'
      number: 1
    models:
      pull:
        - qwen3.5:9b
      run:
        - qwen3.5:9b
  runtimeClassName: nvidia
  persistentVolume:
    enabled: true
    volumeName: "ollama-pv"
ingress:
  enabled: true
  host: ai.test.pitlor.dev
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Generative AI
    gethomepage.dev/icon: open-webui.png
    gethomepage.dev/name: Open WebUI
    gethomepage.dev/group: Apps
    gethomepage.dev/pod-selector: ""