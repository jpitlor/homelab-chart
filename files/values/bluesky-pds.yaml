# https://github.com/Nerkho/helm-charts/blob/main/charts/bluesky-pds/templates/deployment.yaml
image:
  tag: 0.4.182

ingress:
  enabled: true
  className: "traefik"
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Social Media data server
    gethomepage.dev/icon: bluesky.png
    gethomepage.dev/name: Bluesky
    gethomepage.dev/group: Services
    gethomepage.dev/pod-selector: ""
  hosts:
    - host: tweet.test.pitlor.dev
      paths:
        - path: /
          pathType: Prefix
    - host: "*.tweet.test.pitlor.dev"
      paths:
        - path: /
          pathType: Prefix

podAnnotations:
  "backup.velero.io/backup-volumes": data

pds:
  config:
    hostname: tweet.test.pitlor.dev
    secrets:
      existingSecret: bluesky-secrets
    pdsEmailFromAddress: "noreply@pitlor.dev"
  dataStorage:
    storageClass: "ssd"