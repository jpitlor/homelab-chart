{{ if index .Values "infisical-standalone" "enabled" }}
apiVersion: v1
kind: Secret
metadata:
  name: infisical-secrets
  namespace: infisical-standalone
type: Opaque
stringData:
  AUTH_SECRET: {{ index .Values "infisical-standalone" "authSecret" | required "No auth secret provided" | quote }}
  ENCRYPTION_KEY: {{ index .Values "infisical-standalone" "encryptionKey" | required "No encryption key provided" | quote }}
  SITE_URL: "https://vault.test.pitlor.dev"
  DB_CONNECTION_URI: postgresql://infisical-standalone:infisical-standalone@{{ template "dev.pitlor.homelab.postgres-name" (list $ "infisical-standalone") }}
{{ end }}