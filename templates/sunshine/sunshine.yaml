apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sunshine-games-ingress
  namespace: sunshine
spec:
  ingressClassName: traefik
  rules:
  - host: games.test.pitlor.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sunshine
            port:
              number: 47989
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sunshine-config-ingress
  namespace: sunshine
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Remote Games
    gethomepage.dev/icon: sunshine.png
    gethomepage.dev/name: Sunshine
    gethomepage.dev/group: Services
    gethomepage.dev/pod-selector: ""
spec:
  ingressClassName: traefik
  rules:
  - host: games-config.test.pitlor.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sunshine
            port:
              number: 47990
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: insecure-transport
  namespace: sunshine
spec:
  insecureSkipVerify: true
---
apiVersion: v1
kind: Service
metadata:
  name: sunshine
  namespace: sunshine
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: sunshine-insecure-transport@kubernetescrd
spec:
  selector:
    app: sunshine
  ports:
    {{- range (concat (untilStep 47984 47991 1) (list 48010)) }}
    - protocol: TCP
      name: sunshine-tcp-{{ . }}
      port: {{ . }}
      targetPort: {{ . }}
      nodePort: {{ . }}
    {{ end }}
    {{- range (concat (untilStep 47998 48001 1) (list 48010)) }}
    - protocol: UDP
      name: sunshine-udp-{{ . }}
      port: {{ . }}
      targetPort: {{ . }}
      nodePort: {{ . }}
    {{- end }}
  type: NodePort
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: games
  namespace: sunshine
spec:
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi # This needs to be expanded by a lot when possible
  accessModes:
    - ReadWriteOnce
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home        
  namespace: sunshine
spec:
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi
  accessModes:
    - ReadWriteOnce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sunshine
  namespace: sunshine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sunshine
  template:
    metadata:
      labels:
        app: sunshine
    spec:
      runtimeClassName: nvidia
      containers:
        - name: sunshine
          securityContext:
            privileged: true
          image: josh5/steam-headless:latest
          resources:
            requests:
              nvidia.com/gpu: 1 
            limits:
              nvidia.com/gpu: 1 
          volumeMounts:
          - name: home-dir
            mountPath: /home/default/
          - name: games-dir
            mountPath: /mnt/games/
          - name: input-devices
            mountPath: /dev/input/
          - name: dshm
            mountPath: /dev/shm
          env: #Environmental Vars
          - name: NAME
            value: 'Homelab Games'
          - name: TZ
            value: 'America/New_York'
          - name: USER_LOCALES
            value: 'en_US.UTF-8 UTF-8'
          - name: DISPLAY
            value: ':55'
          - name: DOCKER_RUNTIME
            value: 'nvidia'
          - name: PUID
            value: '1000'
          - name: PGID
            value: '1000'
          - name: UMASK
            value: '000'
          - name: USER_PASSWORD
            value: 'password' #changeme
          - name: MODE
            value: 'primary'
          - name: WEB_UI_MODE
            value: 'none'
          - name: ENABLE_VNC_AUDIO
            value: 'false'
          - name: PORT_NOVNC_WEB
            value: '8083'
          - name: NEKO_NAT1TO1
            value: ''
          - name: ENABLE_SUNSHINE
            value: 'true'
          - name: SUNSHINE_USER
            value: 'sunshine'
          - name: SUNSHINE_PASS
            value: 'sunshine'
          - name: ENABLE_EVDEV_INPUTS
            value: 'true'
          - name: NVIDIA_DRIVER_CAPABILITIES
            value: 'all'
          - name: NVIDIA_VISIBLE_DEVICES
            value: 'all'
          - name: NVIDIA_DRIVER_VERSION
            value: 580.126.18
      volumes:
        - name: home-dir
          persistentVolumeClaim:
            claimName: home
        - name: games-dir
          persistentVolumeClaim:
            claimName: games
        - name: input-devices
          hostPath:
            path: /dev/input/
        - name: dshm
          emptyDir:
            medium: Memory
