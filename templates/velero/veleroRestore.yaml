{{ if .Values.velero.restore }}
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: velero-restore-{{ .Values.velero.version }}
  namespace: homelab
spec:
  scheduleName: pvc-daily-backup
  restorePVs: true
  includedNamespaces:
    {{- range keys .Values.applications }}
    {{- $appConfig := get .Values.applications . -}}
    {{- if .enabled }}
    - {{ .name }}
    {{- end }}
    {{- end }}
{{ end }}