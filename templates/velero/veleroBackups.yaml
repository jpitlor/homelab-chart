apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-policy
  namespace: homelab
data:
  policy.json: |
    {
      "version": "v1",
      "volumePolicies": [
        {
          "conditions": {
            "storageClass": ["ssd"]
          },
          "action": {
            "type": "fs-backup"
          }
        },
        {
          "conditions": {},
          "action": {
            "type": "skip"
          }
        }
      ]
    }
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: pvc-daily-backup
  namespace: homelab
spec:
  schedule: "0 2 * * *"
  template:
    snapshotMoveData: true
    resourcePolicies:
      kind: ConfigMap
      name: backup-policy
    includedNamespaces:
      {{- range keys .Values }}
      {{- if (get $.Values .).enabled }}
      - {{ . }}
      {{- end }}
      {{- end }}
    includeClusterResources: true
    storageLocation: gcs-backup-location
    ttl: 720h0m0s